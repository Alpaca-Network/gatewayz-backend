name: CI Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  repository_dispatch:
    types: [monorepo-sync]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Job 1: Linting and Code Quality
  lint:
    name: Code Quality Checks
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      # Wheelhouse cache for binary dependencies
      - name: Restore wheelhouse cache
        uses: actions/cache@v4
        with:
          path: .cache/wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Build wheels
        run: |
          mkdir -p .cache/wheels
          pip wheel -r requirements.txt -w .cache/wheels
          pip wheel -r requirements-dev.txt -w .cache/wheels

      - name: Install from wheelhouse
        run: |
          pip install --no-index --find-links=.cache/wheels -r requirements.txt
          pip install --no-index --find-links=.cache/wheels ruff black isort mypy

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-mypy-

      - name: Run Ruff (Fast Python Linter)
        run: |
          ruff check src/ --output-format=github
        continue-on-error: true

      - name: Check code formatting with Black
        run: |
          black --check src/
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          isort --check-only src/
        continue-on-error: true

      - name: MyPy type checking
        run: |
          mypy --cache-dir .mypy_cache src
        continue-on-error: true

  # Job 2: Security Checks
  security:
    name: Security Scan
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit (Security Linter)
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ || true
        continue-on-error: true

      - name: Check for known vulnerabilities in dependencies
        run: |
          safety check --json || true
        continue-on-error: true

  # Job 3: Run Tests by Category
  # Each category runs as a separate job for clear visual pass/fail per area
  test:
    name: "Tests (${{ matrix.category }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        include:
          - category: core-services
            paths: "tests/services/"
          - category: routes
            paths: "tests/routes/"
          - category: database
            paths: "tests/db/"
          - category: integration
            paths: "tests/integration/ tests/e2e/"
          - category: billing
            paths: "tests/billing/ tests/schemas/"
          - category: infrastructure
            paths: "tests/config/ tests/middleware/ tests/health/"
          - category: security
            paths: "tests/security/ tests/utils/"
          - category: conceptual
            paths: "tests/conceptual_model/ tests/unit/"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      # Wheelhouse cache for binary dependencies
      - name: Restore wheelhouse cache
        uses: actions/cache@v4
        with:
          path: .cache/wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Install from wheelhouse
        run: |
          pip install --no-index --find-links=.cache/wheels -r requirements.txt
          pip install --no-index --find-links=.cache/wheels pytest pytest-cov pytest-xdist pytest-timeout

      # Restore pytest cache
      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ github.sha }}-${{ matrix.category }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Run tests
        id: test_run
        env:
          CATEGORY: ${{ matrix.category }}
          # Test environment variables
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://test-placeholder.invalid' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'test-key' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'test-key' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'test-encryption-key-32-bytes!' }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY || 'test-admin-key' }}
        run: |
          # Build test path array from space-separated paths
          IFS=' ' read -ra PATHS <<< "${{ matrix.paths }}"
          TEST_PATH=()
          for p in "${PATHS[@]}"; do
            if [ -d "$p" ]; then
              # Only include directories that have test files
              if find "$p" -name "test_*.py" -type f | grep -q .; then
                TEST_PATH+=("$p")
              fi
            fi
          done

          # Also include root-level test files for the conceptual category
          if [ "$CATEGORY" = "conceptual" ]; then
            mapfile -t ROOT_FILES < <(find tests/ -maxdepth 1 -name "test_*.py" -type f | sort)
            TEST_PATH+=("${ROOT_FILES[@]}")
          fi

          if [ "${#TEST_PATH[@]}" -eq 0 ]; then
            echo "::warning::No test files found for $CATEGORY — skipping"
            exit 0
          fi

          echo "=========================================="
          echo "  Category: $CATEGORY"
          echo "  Path:     ${TEST_PATH[*]}"
          echo "=========================================="

          set +e  # Capture exit code manually
          pytest "${TEST_PATH[@]}" -v --tb=short \
            -n auto \
            --timeout=30 \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            -m "not smoke and not benchmark" \
            2>&1 | tee "test-output-$CATEGORY.txt"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Exit code 5 = no tests collected (e.g., all deselected by markers)
          if [ "$EXIT_CODE" -eq 5 ]; then
            echo "::notice::No tests collected for $CATEGORY (all excluded by markers)"
            exit 0
          fi
          exit "$EXIT_CODE"

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "test-output-${{ matrix.category }}"
          path: "test-output-${{ matrix.category }}.txt"
          if-no-files-found: ignore

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-${{ matrix.category }}"
          path: .coverage
          if-no-files-found: ignore

  # Job 3B: Merge coverage reports
  coverage:
    name: Coverage Report
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: test
    if: always()
    outputs:
      has_failures: ${{ steps.check_tests.outputs.has_failures }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install coverage tools
        run: |
          pip install coverage pytest-cov

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Download test outputs
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: test-output-*
          merge-multiple: true

      - name: Summarize test results by category
        id: check_tests
        if: always()
        run: |
          echo "=========================================="
          echo "  Test Results by Category"
          echo "=========================================="
          echo ""

          HAS_FAILURES=false

          for f in test-output-*.txt; do
            [ -f "$f" ] || continue
            CATEGORY=$(echo "$f" | sed 's/test-output-//;s/\.txt//')

            PASSED=$(grep -cE '^tests/\S+.*PASSED' "$f" 2>/dev/null || echo "0")
            FAILED=$(grep -cE '^tests/\S+.*FAILED' "$f" 2>/dev/null || echo "0")
            SKIPPED=$(grep -cE '^tests/\S+.*SKIPPED' "$f" 2>/dev/null || echo "0")
            ERRORS=$(grep -cE '^tests/\S+.*ERROR' "$f" 2>/dev/null || echo "0")

            if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              STATUS="FAIL"
              HAS_FAILURES=true
            else
              STATUS="PASS"
            fi

            printf "  %-15s %s  (passed: %s, failed: %s, skipped: %s, errors: %s)\n" \
              "$CATEGORY" "$STATUS" "$PASSED" "$FAILED" "$SKIPPED" "$ERRORS"
          done

          echo ""
          echo "=========================================="

          # Consolidate all outputs
          cat test-output-*.txt > all-test-output.txt 2>/dev/null || echo "No test outputs to merge"

          if [ "$HAS_FAILURES" = "true" ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
            echo "Test failures detected in one or more categories"
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "All test categories passed"
          fi

      - name: Merge coverage reports
        run: |
          # Each artifact is downloaded to coverage-artifacts/<artifact-name>/.coverage
          # We need to rename them to avoid conflicts during combine
          echo "Merging coverage from all categories..."

          # Create a directory for all coverage files
          mkdir -p coverage-data

          # Copy and rename each .coverage file from the downloaded artifacts
          for artifact_dir in coverage-artifacts/coverage-*; do
            if [ -d "$artifact_dir" ] && [ -f "$artifact_dir/.coverage" ]; then
              CATEGORY=$(basename "$artifact_dir" | sed 's/coverage-//')
              echo "Found coverage for: $CATEGORY"
              cp "$artifact_dir/.coverage" "coverage-data/.coverage.$CATEGORY"
            fi
          done

          # List what we found
          echo "Coverage files to merge:"
          ls -la coverage-data/ || echo "⚠️ No coverage files found"

          # Move coverage files to current directory for combining
          if [ -d coverage-data ] && [ "$(ls -A coverage-data)" ]; then
            mv coverage-data/.coverage.* . 2>/dev/null

            # Combine all coverage files into one .coverage file
            echo "Combining coverage files..."
            coverage combine --keep || echo "⚠️ Coverage combine had warnings"

            # Generate XML report from combined coverage
            echo "Generating coverage XML..."
            coverage xml -o coverage.xml || echo "⚠️ Coverage XML generation had warnings"

            # Display coverage report
            echo "Coverage Summary:"
            coverage report --fail-under=25 || echo "⚠️ Coverage below 25% threshold"

            # Verify the coverage.xml was created
            if [ -f coverage.xml ]; then
              echo "✅ Coverage XML generated successfully"
              ls -lh coverage.xml
            else
              echo "❌ Error: coverage.xml was not generated"
            fi
          else
            echo "❌ No coverage files found to merge"
          fi

      - name: Check coverage progress
        if: always()
        run: |
          echo "📊 Coverage Progress Tracker"
          echo "Current minimum: 25%"
          echo "Next milestone: 35% (Target: Month 2)"
          echo "Phase 3A Goal: 40% (Add auth, users, api_keys, db_security tests)"
          echo "Phase 3 Final Goal: 90% (Complete test coverage)"
          echo ""
          echo "Run locally: pytest tests/ --cov=src --cov-report=html"

      - name: Upload consolidated test output
        if: always() && steps.check_tests.outputs.has_failures == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: all-test-output.txt
          if-no-files-found: ignore

      - name: Upload merged coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-gatewayz
          fail_ci_if_error: false
        continue-on-error: true


  # Job 4: Build Check
  build:
    name: Build Verification
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [lint, test, coverage]  # Build blocked by lint and test failures; coverage always runs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      # Wheelhouse cache for binary dependencies
      - name: Restore wheelhouse cache
        uses: actions/cache@v4
        with:
          path: .cache/wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Install from wheelhouse
        run: |
          pip install --no-index --find-links=.cache/wheels -r requirements.txt

      - name: Test application startup
        run: |
          # Quick startup test (don't start server, just import)
          python -c "from src.main import app; print('✅ App imports successfully')"

      - name: Verify Railway config
        run: |
          # Check Railway config files exist
          test -f railway.json && echo "✅ railway.json exists"
          test -f railway.toml && echo "✅ railway.toml exists"
          test -f nixpacks.toml && echo "✅ nixpacks.toml exists"
          test -f start.sh && echo "✅ start.sh exists"
          echo "✅ Railway deployment config verified"

  # Job 5: Deployment Ready Check
  deployment-check:
    name: Deployment Ready
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [lint, security, coverage, build]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: All checks passed ✅
        run: |
          echo "🎉 All CI checks passed!"
          echo "✅ Code quality: PASSED"
          echo "✅ Security: PASSED"
          echo "✅ Tests: PASSED"
          echo "✅ Build: PASSED"
          echo ""
          echo "🚀 Ready for deployment to Railway"
          echo "Branch: ${{ github.ref_name }}"

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All CI checks passed! This PR is ready to merge and deploy.'
            })

  # Job 5B: Trigger Cursor CLI Auto-Fix
  # (Automatically triggers via workflow_run, but can also be manually dispatched)
  trigger-cursor-auto-fix:
    name: Notify Cursor Auto-Fix
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Depends on critical jobs and runs if any failed
    needs: [lint, security, test, coverage, build]
    if: failure()

    steps:
      - name: Log CI failure detected
        run: |
          echo "📌 CI failure detected - Cursor auto-fix workflow will be triggered"
          echo ""
          echo "The 'fix-ci-cursor' workflow will:"
          echo "  ✓ Detect the failure"
          echo "  ✓ Analyze root cause"
          echo "  ✓ Apply targeted fixes"
          echo "  ✓ Commit directly to PR branch"
          echo ""
          echo "🔗 Workflow: .github/workflows/fix-ci-cursor.yml"

  # Job 6: Railway Deployment Notification
  notify-deployment:
    name: Notify Deployment
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [deployment-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Deployment notification
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "🚀 Deploying to PRODUCTION via Railway..."
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "🚀 Deploying to STAGING via Railway..."
          fi
