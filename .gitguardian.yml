# GitGuardian Configuration
# Prevents hardcoded secrets from being committed to the repository
# See: docs/SECRET_MANAGEMENT.md for detailed guidance

# Paths to skip entirely
paths-ignore:
  - "node_modules/"
  - ".git/"
  - ".pytest_cache/"
  - "__pycache__/"
  - ".venv/"
  - "venv/"
  - "dist/"
  - "build/"
  - ".egg-info/"
  - "*.egg-info/"
  - ".mypy_cache/"
  - ".ruff_cache/"
  - "htmlcov/"
  - ".coverage"
  - "docs/examples/"
  - "tests/fixtures/"

# Explicitly allowlist secrets that were exposed in git history but are now removed/rotated
# IMPORTANT: These secrets should be revoked and rotated
# Format: "secret_value"  # Commit hash - Description
allowlist:
  # Test API key that was removed (commit 848c2f9b)
  - "gw_live_01eQv2HGWkjo0ApxoC4-G3yaOv6ilbzJwL9t6QpjQ5c"
  # Supabase test key that was removed (commit 848c2f9b)
  - "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlubGVyb2VoeXJtYWFma2dqZ21yIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1OTY4Nzc3OSwiZXhwIjoyMDc1MjYzNzc5fQ.kIehmSJC9EX86rkhCbhzX6ZHiTfQO7k6ZM2wU4e6JNs"
  # First exposed test key from performance tests
  - "gw_live_keYT21TicJZzxObd8-6LJukxOg5p0CLo_3Yki83w3pU"
  # Generic CLI Secret from commit a35eed6 (now removed and rotated)
  # See: docs/GITGUARDIAN_REMEDIATION.md for details
  # - "EXPOSED_SECRET_PLACEHOLDER"

# Stricter scanning for specific paths (more aggressive)
paths-strict:
  - "src/"
  - "api/"
  - "scripts/"

# Additional configuration
verbose: true
show-secrets: false

# Incident response
# If a secret is detected:
# 1. Immediately revoke the secret
# 2. Rotate to a new secret
# 3. Update all references
# 4. Rewrite git history if necessary
# 5. Add to allowlist with commit hash
# 6. Document in docs/GITGUARDIAN_REMEDIATION.md
